<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Multi-Ledger Engine V12</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #020613;
            --panel-bg: #080e1b;
            --card-bg: #10172a;
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.25);
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0; padding: 0;
            min-height: 100vh;
            display: flex; justify-content: center;
        }

        .app-shell {
            width: 100%; max-width: 460px;
            background: var(--panel-bg); min-height: 100vh;
            display: flex; flex-direction: column;
            position: relative; padding-bottom: 90px;
            box-sizing: border-box;
            box-shadow: 0 0 60px rgba(0,0,0,0.85);
        }

        .header-bar {
            padding: 20px; display: flex;
            justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
            background: rgba(8, 14, 27, 0.85); backdrop-filter: blur(12px);
            position: sticky; top: 0; z-index: 100;
        }

        .logo {
            font-size: 19px; font-weight: 900; letter-spacing: 0.5px;
            background: linear-gradient(135deg, #a5b4fc, #6366f1);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }

        .app-content { padding: 20px; flex: 1; }
        .form-group { margin-bottom: 16px; }
        
        input, select {
            width: 100%; padding: 14px 16px;
            background: #040812; border: 1px solid var(--border);
            border-radius: 14px; color: #fff; font-size: 14px;
            box-sizing: border-box; outline: none; transition: all 0.2s ease;
        }

        input:focus, select:focus {
            border-color: var(--primary); box-shadow: 0 0 14px var(--primary-glow);
        }

        button {
            width: 100%; padding: 14px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none; border-radius: 14px; color: white;
            font-size: 14px; font-weight: 700; cursor: pointer;
            box-shadow: 0 4px 12px rgba(79, 70, 229, 0.25);
            transition: all 0.2s ease;
        }

        .pure-image-banner {
            width: 100%; height: 180px; border-radius: 24px;
            background-size: cover; background-position: center;
            margin-bottom: 20px; box-shadow: 0 12px 32px rgba(0,0,0,0.55);
            border: 1px solid rgba(255,255,255,0.07); cursor: pointer;
            transition: transform 0.2s ease;
        }

        .section-headline {
            font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px;
            color: var(--text-muted); margin: 28px 0 14px 0; font-weight: 800;
            display: flex; align-items: center; gap: 6px;
        }
        .section-headline:first-of-type { margin-top: 5px; }

        .plan-row-card {
            background: linear-gradient(135deg, #16153b 0%, #0e1629 100%);
            border: 1px solid rgba(99, 102, 241, 0.22); border-radius: 20px;
            padding: 20px; margin-bottom: 15px; cursor: pointer;
        }

        .statement-card {
            background: var(--card-bg); border-radius: 24px;
            padding: 22px; border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .metric-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 13px 0; border-bottom: 1px solid rgba(255, 255, 255, 0.04); font-size: 14px;
        }
        .metric-row:last-child { border: none; }
        .metric-row span { color: var(--text-muted); }

        .timeline-stream { margin-top: 15px; }
        .log-node {
            border-left: 2px solid rgba(99, 102, 241, 0.18); padding-left: 18px;
            position: relative; padding-bottom: 20px;
        }
        .log-node::before {
            content: ''; position: absolute; left: -6px; top: 4px;
            width: 10px; height: 10px; background: var(--primary); border-radius: 50%;
        }
        .log-node.add::before { background: var(--success); }
        .log-node.sub::before { background: var(--danger); }
        .log-time { font-size: 11px; color: var(--text-muted); font-weight: 600; }
        .log-msg { font-size: 13px; color: #ffffff; margin-top: 2px; }

        .bottom-dock {
            position: absolute; bottom: 0; left: 0; width: 100%;
            height: 78px; background: rgba(2, 6, 19, 0.93);
            border-top: 1px solid var(--border); backdrop-filter: blur(14px);
            display: flex; justify-content: space-around; align-items: center; z-index: 100;
        }

        .dock-item {
            display: flex; flex-direction: column; align-items: center;
            color: var(--text-muted); font-size: 11px; font-weight: 600; cursor: pointer;
        }
        .dock-item i { font-size: 19px; margin-bottom: 5px; }
        .dock-item.active { color: var(--primary); }

        .admin-card {
            background: var(--card-bg); border-radius: 22px;
            padding: 18px; margin-bottom: 18px; border: 1px solid var(--border);
        }

        .mini-badge {
            background: rgba(16, 185, 129, 0.14); color: var(--success);
            padding: 4px 10px; border-radius: 8px; font-size: 11px; font-weight: 700;
        }
    </style>
</head>
<body>

<div class="app-shell">
    
    <div class="header-bar">
        <div class="logo"><i class="fa-solid fa-layer-group"></i> MATRIX MULTI-HUB</div>
    </div>

    <div class="app-content">
        
        <div id="view-login">
            <h2 style="font-size: 26px; margin-bottom: 6px; font-weight: 800;">Identity Terminal</h2>
            <p style="color: var(--text-muted); font-size: 13px; margin-bottom: 35px;">Enter identity node string to check or create ledger status tables.</p>
            
            <div class="form-group">
                <input type="text" id="auth-handle" placeholder="Enter Account Name...">
            </div>
            <button onclick="executeAuthentication()">Establish Identity Instantly</button>
        </div>

        <div id="view-home" style="display: none;">
            <div class="section-headline"><i class="fa-solid fa-images"></i> Active Dynamic Schemes (Click Image)</div>
            
            <div id="dynamic-banner-allocation-zone"></div>

            <div id="active-user-scheme-zone"></div>
        </div>

        <div id="view-details" style="display: none;">
            <div id="multi-ledger-render-container"></div>
        </div>

        <div id="view-profile" style="display: none;">
            <div class="section-headline"><i class="fa-solid fa-circle-user"></i> Certified User Profile</div>
            <div class="statement-card" style="padding: 30px 20px; text-align: center;">
                <div style="width:80px; height:80px; background:var(--primary); border-radius:50%; margin:0 auto 15px auto; display:flex; align-items:center; justify-content:center;">
                    <i class="fa-solid fa-user-astronaut" style="font-size:32px; color:#fff;"></i>
                </div>
                <h2 id="profile-user-title" style="margin: 0 0 5px 0; font-size: 24px; font-weight: 800;">Account Node</h2>
                <p id="profile-schemes-count" style="color: var(--primary); font-size: 13px; margin: 0 0 25px 0; font-weight:600;"></p>
                <button style="background: var(--danger);" onclick="terminateSession()">Sign Out Account</button>
            </div>
        </div>

        <div id="view-admin" style="display: none;">
            <h3 style="margin-top:0; font-size: 20px; color:#fbbf24;"><i class="fa-solid fa-terminal"></i> Controller Terminal</h3>
            
            <div class="admin-card" style="background: rgba(0,0,0,0.25);">
                <h4 style="font-size:13px; margin-top:0; margin-bottom:15px; color:#a5b4fc; text-transform:uppercase;">Deploy New User Profile</h4>
                <div class="form-group"><input type="text" id="adm-user-name" placeholder="Enter Member Account Name"></div>
                <button style="background:var(--success);" onclick="adminProvisionNewUserOnly()">Register New Empty User</button>
            </div>

            <div class="section-headline"><i class="fa-solid fa-folder-tree"></i> Active Directory Database</div>
            <div id="admin-directory-stack"></div>
        </div>

    </div>

    <div class="bottom-dock" id="app-navigation-dock" style="display: none;">
        <div class="dock-item active" id="dock-home" onclick="navigateToRoute('view-home')">
            <i class="fa-solid fa-wallet"></i><span>Home</span>
        </div>
        <div class="dock-item" id="dock-details" onclick="navigateToRoute('view-details')">
            <i class="fa-solid fa-chart-pie"></i><span>Ledger</span>
        </div>
        <div class="dock-item" id="dock-profile" onclick="navigateToRoute('view-profile')">
            <i class="fa-solid fa-fingerprint"></i><span>Profile</span>
        </div>
        <div class="dock-item" id="dock-admin" style="display:none;" onclick="navigateToRoute('view-admin')">
            <i class="fa-solid fa-unlock-keyhole"></i><span>Admin</span>
        </div>
    </div>

</div>

<script>
    let datasetEngine = JSON.parse(localStorage.getItem('sys_matrix_v12_multichit')) || [];
    let runtimeUser = null;
    const terminalRootKey = "thivashthivash143@gmail.com";

    // Standard high quality asset urls mapped behind backend labels
    const schemeAssetBanners = {
        "save_money": "https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600",
        "target": "https://images.unsplash.com/photo-1634017839464-5c339ebe3cb4?q=80&w=600"
    };

    window.addEventListener('load', () => {
        let activeSessionKey = localStorage.getItem('sys_matrix_v12_session_lock');
        if (activeSessionKey) {
            if (activeSessionKey.toLowerCase() === terminalRootKey.toLowerCase()) { bootAdminSession(); } 
            else {
                let foundUser = datasetEngine.find(u => u.name.toLowerCase() === activeSessionKey.toLowerCase());
                if (foundUser) { runtimeUser = foundUser; bootUserSession(foundUser.name); } 
                else { localStorage.removeItem('sys_matrix_v12_session_lock'); }
            }
        }
    });

    function executeAuthentication() {
        let fieldString = document.getElementById('auth-handle').value.trim();
        if(fieldString === "") { alert("Enter valid account identity name."); return; }

        if(fieldString.toLowerCase() === terminalRootKey.toLowerCase()) {
            localStorage.setItem('sys_matrix_v12_session_lock', fieldString);
            bootAdminSession(); return;
        }

        let userNodeMatch = datasetEngine.find(u => u.name.toLowerCase() === fieldString.toLowerCase());
        
        if(!userNodeMatch) {
            // Rule 1 Fixed: Auto creates account, BUT leaves scheme array completely EMPTY! No auto schemes!
            userNodeMatch = { name: fieldString, schemes: [] };
            datasetEngine.push(userNodeMatch);
            commitClusterMemory();
        }

        runtimeUser = userNodeMatch;
        localStorage.setItem('sys_matrix_v12_session_lock', fieldString);
        bootUserSession(userNodeMatch.name);
    }

    function bootAdminSession() {
        document.getElementById('app-navigation-dock').style.display = 'flex';
        document.getElementById('dock-admin').style.display = 'flex';
        navigateToRoute('view-admin'); renderAdminDirectoryStack();
    }

    function bootUserSession(nameString) {
        document.getElementById('app-navigation-dock').style.display = 'flex';
        document.getElementById('dock-admin').style.display = 'none';
        document.getElementById('profile-user-title').innerText = nameString;
        document.getElementById('profile-schemes-count').innerText = runtimeUser ? `Active Allocated Systems: ${runtimeUser.schemes.length}` : "No Schemes Mapped";
        
        buildUserSchemeCards(); computeStatementProfileMetrics(); navigateToRoute('view-home');
    }

    function buildUserSchemeCards() {
        let bannerZone = document.getElementById('dynamic-banner-allocation-zone');
        let cardZone = document.getElementById('active-user-scheme-zone');
        bannerZone.innerHTML = ""; cardZone.innerHTML = "";

        if(runtimeUser && runtimeUser.schemes.length > 0) {
            // Rule 3 Fixed: Only display pure layout image banners on home. Scheme names are hidden!
            runtimeUser.schemes.forEach((sch, sIdx) => {
                bannerZone.innerHTML += `
                    <div class="pure-image-banner" style="background-image: url('${sch.bannerImg}');" onclick="navigateToRoute('view-details')"></div>
                `;
            });
        } else {
            bannerZone.innerHTML = `
                <div style="text-align:center; padding:40px 20px; color:var(--text-muted); border:1px dashed var(--border); border-radius:24px;">
                    <i class="fa-solid fa-folder-open" style="font-size:32px; margin-bottom:12px; color:var(--primary);"></i>
                    <p style="margin:0; font-size:13px;">No scheme configurations initialized onto this workspace profile. Contact admin.</p>
                </div>
            `;
        }
    }

    function computeStatementProfileMetrics() {
        let container = document.getElementById('multi-ledger-render-container');
        container.innerHTML = "";

        if(!runtimeUser || runtimeUser.schemes.length === 0) {
            container.innerHTML = `<div class="section-headline">Ledger Details</div><div class="statement-card"><p style="color:var(--text-muted); margin:0; font-size:13px;">No transaction files initialized inside database track nodes.</p></div>`;
            return;
        }

        runtimeUser.schemes.forEach((sch, sIdx) => {
            // Internal label translation purely for detailed statement clear understanding
            let displayLabel = sch.schemeType === "save_money" ? "Save Money Ledger" : "Target Matrix Balance";
            let targetRowHTML = "";
            
            if(sch.schemeType === "target") {
                let pendingCash = sch.totalAmount - sch.totalPaid;
                targetRowHTML = `
                    <div class="metric-row"><span>Scheme Setup Target Value</span><strong>₹${sch.totalAmount.toLocaleString('en-IN')}</strong></div>
                    <div class="metric-row" style="background:rgba(239,68,68,0.02)"><span>Outstanding Pending Gap</span><strong style="color:var(--danger);">₹${pendingCash.toLocaleString('en-IN')}</strong></div>
                `;
            }

            let section = document.createElement('div');
            section.innerHTML = `
                <div class="section-headline"><i class="fa-solid fa-receipt"></i> Details: ${displayLabel} (#${sIdx + 1})</div>
                <div class="statement-card">
                    ${targetRowHTML}
                    <div class="metric-row" style="background:rgba(16,185,129,0.02)"><span>Net Remitted Capital Balance</span><strong style="color:var(--success);">₹${sch.totalPaid.toLocaleString('en-IN')}</strong></div>
                    <div class="metric-row" style="border-top:1px solid var(--border); margin-top:10px; padding-top:12px;"><span>Today Ledger Input</span><strong style="color:#a5b4fc;">₹${sch.todayPaid.toLocaleString('en-IN')}</strong></div>
                    
                    <div style="font-size:11px; color:var(--text-muted); margin-top:15px; font-weight:700; text-transform:uppercase;">Time Entry Records</div>
                    <div class="timeline-stream" id="logs-stream-sch-${sIdx}"></div>
                </div>
            `;
            container.appendChild(section);

            let logsTimeline = document.getElementById(`logs-stream-sch-${sIdx}`);
            let logsReversed = [...sch.logs].reverse();
            logsReversed.forEach(log => {
                logsTimeline.innerHTML += `
                    <div class="log-node ${log.type}">
                        <div class="log-time"><i class="fa-regular fa-clock"></i> ${log.timestamp}</div>
                        <div class="log-msg">${log.message}</div>
                    </div>
                `;
            });
        });
    }

    function adminProvisionNewUserOnly() {
        let name = document.getElementById('adm-user-name').value.trim();
        if(name === "") { alert("Enter unique identity handle name."); return; }

        let userMatch = datasetEngine.find(u => u.name.toLowerCase() === name.toLowerCase());
        if(userMatch) { alert("User identity string node already initialized in cluster memory."); return; }

        datasetEngine.push({ name: name, schemes: [] });
        commitClusterMemory(); renderAdminDirectoryStack();
        document.getElementById('adm-user-name').value = "";
        alert(`Account configured successfully: "${name}" initialized with empty maps.`);
    }

    function toggleAdminAmountField(uIdx) {
        let selectionType = document.getElementById(`adm-type-select-${uIdx}`).value;
        let containerBlock = document.getElementById(`adm-target-amt-wrapper-${uIdx}`);
        // Rule 4 Fixed: Target select panna mattum set amount input box visible aagum
        containerBlock.style.display = (selectionType === "target") ? "block" : "none";
    }

    function adminAddSchemeToExisting(uIdx) {
        let typeSelected = document.getElementById(`adm-type-select-${uIdx}`).value;
        let bannerImageAddress = schemeAssetBanners[typeSelected];
        let calculatedTargetValue = 0;

        if(typeSelected === "target") {
            calculatedTargetValue = parseFloat(document.getElementById(`adm-new-sch-amt-${uIdx}`).value);
            if(isNaN(calculatedTargetValue) || calculatedTargetValue <= 0) { alert("Set target system amount frame value accurately."); return; }
        }

        let initializedLogMessage = typeSelected === "target" ? 
            `Target scheme mapped structure deployed. Operational target framework: ₹${calculatedTargetValue.toLocaleString('en-IN')}.` :
            "Save Money scheme portfolio map initialized securely into profile terminal storage.";

        datasetEngine[uIdx].schemes.push({
            schemeType: typeSelected,
            totalAmount: calculatedTargetValue,
            totalPaid: 0, todayPaid: 0,
            bannerImg: bannerImageAddress,
            logs: [{ timestamp: captureTimestamp(), type: 'add', message: initializedLogMessage }]
        });
        
        commitClusterMemory(); renderAdminDirectoryStack();
    }

    function adminUpdateCashFlow(uIdx, sIdx) {
        let cash = parseFloat(document.getElementById(`adm-cash-${uIdx}-${sIdx}`).value);
        let reason = document.getElementById(`adm-reason-${uIdx}-${sIdx}`).value.trim() || "Regular System Flow Variable Injection";
        if(isNaN(cash) || cash <= 0) { alert("Configure true cash matrix digits."); return; }

        let targetSch = datasetEngine[uIdx].schemes[sIdx];
        targetSch.todayPaid = cash; targetSch.totalPaid += cash;
        targetSch.logs.push({
            timestamp: captureTimestamp(), type: 'add',
            message: `Remittance logged: Varavu Entry ₹${cash.toLocaleString('en-IN')}. [Ref: ${reason}].`
        });

        commitClusterMemory(); renderAdminDirectoryStack();
    }

    function adminDeductCashFlow(uIdx, sIdx) {
        let cash = parseFloat(document.getElementById(`adm-cash-${uIdx}-${sIdx}`).value);
        let reason = document.getElementById(`adm-reason-${uIdx}-${sIdx}`).value.trim() || "Operational Data Entry Correction";
        if(isNaN(cash) || cash <= 0) { alert("Input exact evaluation reduction parameters."); return; }

        let targetSch = datasetEngine[uIdx].schemes[sIdx];
        if(targetSch.totalPaid < cash) { alert("Deduction overflow bounds error."); return; }

        targetSch.totalPaid -= cash; targetSch.todayPaid = 0;
        targetSch.logs.push({
            timestamp: captureTimestamp(), type: 'sub',
            message: `Rollback Adjustment executed: Deducted ₹${cash.toLocaleString('en-IN')}. [Reason: ${reason}].`
        });

        commitClusterMemory(); renderAdminDirectoryStack();
    }

    function adminDeleteSpecificScheme(uIdx, sIdx) {
        if(confirm("Intha specific scheme data-vai mattum thookalama? (Account delete aagadhu)")) {
            // Rule 2 Fixed: Splices ONLY the scheme block node. The root user database is untouched.
            datasetEngine[uIdx].schemes.splice(sIdx, 1);
            commitClusterMemory(); renderAdminDirectoryStack();
        }
    }

    function renderAdminDirectoryStack() {
        let stackArea = document.getElementById('admin-directory-stack'); stackArea.innerHTML = "";
        
        datasetEngine.forEach((user, uIdx) => {
            let userCard = document.createElement('div'); userCard.className = 'admin-card';
            let schemesHTML = "";

            user.schemes.forEach((sch, sIdx) => {
                let tagTitle = sch.schemeType === "save_money" ? "Save Money Portfolio" : "Target Tracker Module";
                let descriptiveStats = `<div>Net Remitted Capital: <strong style="color:var(--success);">₹${sch.totalPaid.toLocaleString('en-IN')}</strong></div>`;
                
                if(sch.schemeType === "target") {
                    let pend = sch.totalAmount - sch.totalPaid;
                    descriptiveStats = `
                        <div>Target Structural Cap: <strong>₹${sch.totalAmount.toLocaleString('en-IN')}</strong></div>
                        <div>Net Remitted Capital: <strong style="color:var(--success);">₹${sch.totalPaid.toLocaleString('en-IN')}</strong></div>
                        <div>Outstanding Balance: <strong style="color:var(--danger);">₹${pend.toLocaleString('en-IN')}</strong></div>
                    `;
                }

                schemesHTML += `
                    <div style="background:rgba(0,0,0,0.2); padding:12px; border-radius:14px; margin-top:12px; border:1px solid rgba(255,255,255,0.03);">
                        <div style="display:flex; justify-content:space-between; font-size:13px; font-weight:700; color:#fff; margin-bottom:8px;">
                            <span>${tagTitle} (#${sIdx + 1})</span>
                            <button style="background:none; color:var(--danger); font-size:12px; padding:0; width:auto; box-shadow:none;" onclick="adminDeleteSpecificScheme(${uIdx}, ${sIdx})"><i class="fa-solid fa-trash-can"></i> Delete Scheme</button>
                        </div>
                        <div style="font-size:12px; color:var(--text-muted); line-height:1.6; margin-bottom:10px;">
                            ${descriptiveStats}
                            <div>Innaikku Update Value: <strong style="color:#a5b4fc;">₹${sch.todayPaid.toLocaleString('en-IN')}</strong></div>
                        </div>
                        <div style="display:flex; gap:6px; margin-bottom:8px;">
                            <input type="number" id="adm-cash-${uIdx}-${sIdx}" placeholder="Amount (₹)" style="padding:8px; font-size:12px; flex:1;">
                            <input type="text" id="adm-reason-${uIdx}-${sIdx}" placeholder="Entry Remarks" style="padding:8px; font-size:12px; flex:1.2;">
                        </div>
                        <div style="display:flex; gap:6px;">
                            <button style="padding:8px; font-size:11px; background:var(--success);" onclick="adminUpdateCashFlow(${uIdx}, ${sIdx})">+ Add Cash</button>
                            <button style="padding:8px; font-size:11px; background:#d97706;" onclick="adminDeductCashFlow(${uIdx}, ${sIdx})">- Rollback</button>
                        </div>
                    </div>
                `;
            });

            userCard.innerHTML = `
                <div style="font-size:16px; font-weight:800; border-bottom:1px solid rgba(255,255,255,0.04); padding-bottom:6px; color:#a5b4fc;"><i class="fa-solid fa-id-badge"></i> User Root: ${user.name}</div>
                ${schemesHTML || '<p style="font-size:12px; color:var(--text-muted); margin:10px 0;">No assigned scheme frameworks mapped inside profile structure node.</p>'}
                
                <div style="margin-top:15px; border-top:1px dashed rgba(255,255,255,0.08); padding-top:12px;">
                    <div style="font-size:11px; color:var(--text-muted); font-weight:700; text-transform:uppercase; margin-bottom:8px;">Map New Core Scheme Portfolio</div>
                    <div style="display:flex; gap:6px; margin-bottom: 8px;">
                        <select id="adm-type-select-${uIdx}" onchange="toggleAdminAmountField(${uIdx})" style="padding:8px; font-size:12px; flex:1;">
                            <option value="save_money">1. Save Money</option>
                            <option value="target">2. Target</option>
                        </select>
                    </div>
                    <div id="adm-target-amt-wrapper-${uIdx}" style="display:none; margin-bottom:8px;">
                        <input type="number" id="adm-new-sch-amt-${uIdx}" placeholder="Set Target Amount (₹)" style="padding:8px; font-size:12px;">
                    </div>
                    <button style="padding:8px; font-size:12px; background:linear-gradient(135deg, #818cf8, #4f46e5);" onclick="adminAddSchemeToExisting(${uIdx})">+ Push Scheme Parameters</button>
                </div>
            `;
            stackArea.appendChild(userCard);
        });
    }

    document.addEventListener('visibilitychange', () => { if(!document.hidden) { renderAdminDirectoryStack(); } });

    function navigateToRoute(targetViewId) {
        const screens = ['view-login', 'view-home', 'view-details', 'view-profile', 'view-admin'];
        screens.forEach(s => { document.getElementById(s).style.display = (s === targetViewId) ? 'block' : 'none'; });

        const dockMappings = { 'view-home': 'dock-home', 'view-details': 'dock-details', 'view-profile': 'dock-profile', 'view-admin': 'dock-admin' };
        Object.values(dockMappings).forEach(id => { let el = document.getElementById(id); if(el) el.classList.remove('active'); });
        if(dockMappings[targetViewId]) document.getElementById(dockMappings[targetViewId]).classList.add('active');
    }

    function captureTimestamp() {
        let d = new Date();
        return d.toLocaleDateString('en-IN') + " | " + d.toLocaleTimeString('en-IN', {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    }

    function commitClusterMemory() { localStorage.setItem('sys_matrix_v12_multichit', JSON.stringify(datasetEngine)); }
    
    function terminateSession() {
        runtimeUser = null; localStorage.removeItem('sys_matrix_v12_session_lock');
        document.getElementById('auth-handle').value = ""; document.getElementById('app-navigation-dock').style.display = 'none';
        navigateToRoute('view-login');
    }
</script>
</body>
</html>
