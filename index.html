<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Seetu Ledger</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-main: #090d16;
            --panel-bg: #111625;
            --card-bg: #1a2035;
            --primary: #4f46e5;
            --success: #10b981;
            --danger: #f43f5e;
            --text-main: #ffffff;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        .app-shell {
            width: 100%;
            max-width: 480px;
            background: var(--panel-bg);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: 80px;
            box-sizing: border-box;
        }

        .header-bar {
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            background: linear-gradient(90deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .app-content {
            padding: 20px;
            flex: 1;
        }

        .form-group { margin-bottom: 25px; }
        
        input, select {
            width: 100%;
            padding: 15px 18px;
            background: #090c16;
            border: 1px solid var(--border);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: var(--primary);
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Pure Image Banner (No Text Inside) */
        .pure-image-banner {
            width: 100%;
            height: 170px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            margin-bottom: 25px;
            box-shadow: 0 12px 25px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.05);
            cursor: pointer;
            transition: transform 0.2s;
        }

        .pure-image-banner:active { transform: scale(0.98); }

        .section-headline {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
            font-weight: 600;
        }

        /* Active Plan Cards Layout */
        .plan-row-card {
            background: linear-gradient(135deg, #231f6d 0%, #1a2035 100%);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .statement-card {
            background: var(--card-bg);
            border-radius: 18px;
            padding: 20px;
            border: 1px solid var(--border);
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            padding: 14px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            font-size: 14px;
        }
        .metric-row:last-child { border: none; }
        .metric-row span { color: var(--text-muted); }

        /* Timeline Updates */
        .timeline-stream { margin-top: 20px; }
        .log-node {
            border-left: 2px solid var(--border);
            padding-left: 18px;
            position: relative;
            padding-bottom: 18px;
        }
        .log-node::before {
            content: ''; position: absolute; left: -6px; top: 4px;
            width: 10px; height: 10px; background: var(--primary); border-radius: 50%;
        }
        .log-node.add::before { background: var(--success); }
        .log-node.sub::before { background: var(--danger); }

        /* Bottom Profile / Navigation Dock */
        .bottom-dock {
            position: absolute;
            bottom: 0; left: 0; width: 100%;
            height: 75px; background: #090c16;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-sizing: border-box;
            z-index: 99;
        }

        .dock-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: var(--text-muted);
            font-size: 11px;
            cursor: pointer;
            text-decoration: none;
        }

        .dock-item i { font-size: 22px; margin-bottom: 5px; }
        .dock-item.active { color: var(--primary); }

        .admin-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="app-shell">
    
    <div class="header-bar">
        <div class="logo"><i class="fa-solid fa-wallet"></i> SEETU MATRIX</div>
        <div id="user-avatar-zone"></div>
    </div>

    <div class="app-content">
        
        <div id="view-login">
            <h2 style="font-size: 24px; margin-bottom: 6px;">Sign In</h2>
            <p style="color: var(--text-muted); font-size: 14px; margin-bottom: 30px;">Enter account name to sync database terminal.</p>
            
            <div class="form-group">
                <input type="text" id="auth-handle" placeholder="Enter Registration Name...">
            </div>
            <button onclick="executeAuthentication()">Login Account</button>
        </div>

        <div id="view-home" style="display: none;">
            
            <div class="section-headline">Featured Insight</div>
            <div class="pure-image-banner" style="background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=600&auto=format&fit=crop');" onclick="navigateToRoute('view-details')"></div>

            <div id="active-user-scheme-zone"></div>

            <div class="section-headline">WhatsApp Service Desk</div>
            <div class="pure-image-banner" style="background-image: url('https://images.unsplash.com/photo-1614741118887-7a4ee193a5fa?q=80&w=600&auto=format&fit=crop');" onclick="triggerWhatsAppRedirect()"></div>
        </div>

        <div id="view-details" style="display: none;">
            <div class="section-headline">Ledger Metrics Overview</div>
            <div class="statement-card" id="metrics-sheet-render"></div>

            <div class="section-headline" style="margin-top: 25px;">Live Statement Timestamps</div>
            <div class="timeline-stream" id="logs-timeline-render"></div>
        </div>

        <div id="view-admin" style="display: none;">
            <h3 style="margin-top:0; color:#fbbf24;">Terminal Root Admin</h3>
            
            <div class="admin-card" style="background: rgba(0,0,0,0.2);">
                <h4 style="font-size:14px; margin-top:0; margin-bottom:12px;">Map User Profile Node</h4>
                <input type="text" id="adm-user-name" placeholder="Account Name" style="margin-bottom:12px;">
                <select id="adm-user-strategy" style="margin-bottom:15px;">
                    <option value="500-105">₹500 Plan Scheme (105 Weeks)</option>
                    <option value="1000-110">₹1000 Plan Scheme (110 Weeks)</option>
                </select>
                <button style="background:var(--success);" onclick="adminProvisionNode()">Deploy Node</button>
            </div>

            <div id="admin-directory-stack"></div>
        </div>

    </div>

    <div class="bottom-dock" id="app-navigation-dock" style="display: none;">
        <div class="dock-item active" id="dock-home" onclick="navigateToRoute('view-home')">
            <i class="fa-solid fa-house-chimney"></i><span>Home</span>
        </div>
        <div class="dock-item" id="dock-details" onclick="navigateToRoute('view-details')">
            <i class="fa-solid fa-chart-column"></i><span>Statements</span>
        </div>
        <div class="dock-item" id="dock-admin" style="display:none;" onclick="navigateToRoute('view-admin')">
            <i class="fa-solid fa-user-gear"></i><span>Admin</span>
        </div>
        <div class="dock-item" onclick="terminateSession()">
            <i class="fa-solid fa-circle-user" style="color: var(--danger);"></i><span>SignOut</span>
        </div>
    </div>

</div>

<script>
    let datasetEngine = JSON.parse(localStorage.getItem('sys_matrix_v7')) || [];
    let runtimeUser = null;
    const terminalRootKey = "thivashthivash143@gmail.com";

    function executeAuthentication() {
        let fieldString = document.getElementById('auth-handle').value.trim();
        if(fieldString === "") { alert("Enter proper name handle."); return; }

        if(fieldString.toLowerCase() === terminalRootKey.toLowerCase()) {
            document.getElementById('app-navigation-dock').style.display = 'flex';
            document.getElementById('dock-admin').style.display = 'flex';
            navigateToRoute('view-admin');
            renderAdminDirectoryStack();
            return;
        }

        runtimeUser = datasetEngine.find(u => u.name.toLowerCase() === fieldString.toLowerCase());
        document.getElementById('app-navigation-dock').style.display = 'flex';
        document.getElementById('dock-admin').style.display = 'none';
        
        buildUserSchemeCards();
        computeStatementProfileMetrics();
        navigateToRoute('view-home');
    }

    function buildUserSchemeCards() {
        let zone = document.getElementById('active-user-scheme-zone');
        zone.innerHTML = "";

        if(runtimeUser) {
            zone.innerHTML = `
                <div class="section-headline">My Active Allocation</div>
                <div class="plan-row-card" onclick="navigateToRoute('view-details')">
                    <h3 style="margin:0 0 5px 0; font-size:17px; color:#fff;">₹${runtimeUser.allocation} Standard Plan</h3>
                    <p style="margin:0; font-size:13px; color:var(--text-muted);">Running active status account node track.</p>
                </div>
            `;
        } else {
            zone.innerHTML = `
                <div class="plan-row-card" style="background:#14121a; border-color:var(--danger); cursor:default;">
                    <h3 style="margin:0 0 5px 0; font-size:16px; color:var(--danger);">No System Mapping Identified</h3>
                    <p style="margin:0; font-size:12px; color:var(--text-muted);">Please contact project ledger root to create account parameters.</p>
                </div>
            `;
        }
    }

    function computeStatementProfileMetrics() {
        let contentPanel = document.getElementById('metrics-sheet-render');
        let chronologyPanel = document.getElementById('logs-timeline-render');

        if(!runtimeUser) {
            contentPanel.innerHTML = `<p style="font-size:13px; color:var(--text-muted); margin:0;">No tracking references loaded.</p>`;
            chronologyPanel.innerHTML = `<p style="font-size:13px; color:var(--text-muted);">Timeline clean.</p>`;
            return;
        }

        let installmentCost = runtimeUser.allocation / runtimeUser.totalWeeks;
        let runningPaidSum = runtimeUser.settledWeeks * installmentCost;
        let netLiability = runtimeUser.allocation - runningPaidSum;

        contentPanel.innerHTML = `
            <div class="metric-row"><span>Scheme Target</span><strong>₹${runtimeUser.allocation}</strong></div>
            <div class="metric-row"><span>Total Prescribed Frame</span><strong>${runtimeUser.totalWeeks} Weeks</strong></div>
            <div class="metric-row"><span>Completed Intervals</span><strong style="color:var(--success);">${runtimeUser.settledWeeks} Weeks</strong></div>
            <div class="metric-row"><span>Pending Target Intervals</span><strong>${runtimeUser.totalWeeks - runtimeUser.settledWeeks} Weeks</strong></div>
            <div class="metric-row" style="background:rgba(16,185,129,0.04)"><span>Total Remitted Capital</span><strong style="color:var(--success);">₹${runningPaidSum.toFixed(2)}</strong></div>
            <div class="metric-row" style="background:rgba(244,63,94,0.04)"><span>Net Outstanding Debt</span><strong style="color:var(--danger);">₹${netLiability.toFixed(2)}</strong></div>
        `;

        chronologyPanel.innerHTML = "";
        let logsReversedArray = [...runtimeUser.logs].reverse();
        logsReversedArray.forEach(log => {
            let div = document.createElement('div');
            div.className = `log-node ${log.type}`;
            div.innerHTML = `
                <div style="font-size:11px; color:var(--text-muted);">${log.timestamp}</div>
                <div style="font-size:13px; color:#fff; margin-top:3px;">${log.message}</div>
            `;
            chronologyPanel.appendChild(div);
        });
    }

    function adminProvisionNode() {
        let name = document.getElementById('adm-user-name').value.trim();
        let planSplits = document.getElementById('adm-user-strategy').value.split('-');

        if(name === "") return;
        if(datasetEngine.some(u => u.name.toLowerCase() === name.toLowerCase())) { alert("Conflict logic duplicate locked."); return; }

        datasetEngine.push({
            name: name,
            allocation: parseFloat(planSplits[0]),
            totalWeeks: parseInt(planSplits[1]),
            settledWeeks: 0,
            logs: [{
                timestamp: captureTimestamp(),
                type: 'add',
                message: `Profile array initialized into data matrix under standard setup rules.`
            }]
        });

        commitClusterMemory();
        renderAdminDirectoryStack();
        document.getElementById('adm-user-name').value = "";
    }

    function adminAdjustWeights(index, scaleValue) {
        let trackingNode = datasetEngine[index];
        let calculatedSum = trackingNode.settledWeeks + scaleValue;

        if(calculatedSum < 0 || calculatedSum > trackingNode.totalWeeks) return;

        trackingNode.settledWeeks = calculatedSum;
        let codeType = scaleValue > 0 ? 'add' : 'sub';
        let actionTxt = scaleValue > 0 ? "Incremented" : "Decremented";

        trackingNode.logs.push({
            timestamp: captureTimestamp(),
            type: codeType,
            message: `Admin Action executed: Data array parameter value changed to (${trackingNode.settledWeeks}/${trackingNode.totalWeeks} Weeks).`
        });

        datasetEngine[index] = trackingNode;
        commitClusterMemory();
        renderAdminDirectoryStack();
    }

    function adminPurgeRegistry(index) {
        if(confirm("Purge tracking record node parameters completely?")) {
            datasetEngine.splice(index,1);
            commitClusterMemory();
            renderAdminDirectoryStack();
        }
    }

    function renderAdminDirectoryStack() {
        let targetArea = document.getElementById('admin-directory-stack');
        targetArea.innerHTML = "";

        datasetEngine.forEach((user, index) => {
            let item = document.createElement('div');
            item.className = 'admin-card';
            item.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <strong>${user.name}</strong>
                    <span style="font-size:12px; color:var(--primary); font-weight:600;">₹${user.allocation}</span>
                </div>
                <div style="font-size:13px; color:var(--text-muted); margin-bottom:12px;">
                    Counter Tracking: <strong>${user.settledWeeks} / ${user.totalWeeks} Weeks Active</strong>
                </div>
                <div style="display:flex; gap:8px;">
                    <button style="padding:6px 12px; font-size:12px; background:var(--success);" onclick="adminAdjustWeights(${index}, 1)">+ Add Week</button>
                    <button style="padding:6px 12px; font-size:12px; background:#d97706;" onclick="adminAdjustWeights(${index}, -1)">- Sub Week</button>
                    <button style="padding:6px 12px; font-size:12px; background:var(--danger); width:auto;" onclick="adminPurgeRegistry(${index})"><i class="fa-solid fa-trash-can"></i></button>
                </div>
            `;
            targetArea.appendChild(item);
        });
    }

    function triggerWhatsAppRedirect() {
        let tag = runtimeUser ? runtimeUser.name : "Guest Log";
        window.open(`https://wa.me/919876543210?text=Registry%20Update%20Request%20From%3A%20${encodeURIComponent(tag)}`, '_blank');
    }

    function navigateToRoute(targetViewId) {
        const screens = ['view-login', 'view-home', 'view-details', 'view-admin'];
        screens.forEach(s => {
            document.getElementById(s).style.display = (s === targetViewId) ? 'block' : 'none';
        });

        const dockMappings = { 'view-home': 'dock-home', 'view-details': 'dock-details', 'view-admin': 'dock-admin' };
        Object.values(dockMappings).forEach(id => {
            let el = document.getElementById(id);
            if(el) el.classList.remove('active');
        });
        if(dockMappings[targetViewId]) document.getElementById(dockMappings[targetViewId]).classList.add('active');
    }

    function captureTimestamp() {
        let d = new Date();
        return d.toLocaleDateString() + " | " + d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', second:'2-digit'});
    }

    function commitClusterMemory() { localStorage.setItem('sys_matrix_v7', JSON.stringify(datasetEngine)); }
    
    function terminateSession() {
        runtimeUser = null;
        document.getElementById('auth-handle').value = "";
        document.getElementById('app-navigation-dock').style.display = 'none';
        navigateToRoute('view-login');
    }
</script>
</body>
</html>
