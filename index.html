<!DOCTYPE html>
<html lang="ta">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chit Fund Smart Ledger</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --surface: #171e2e;
            --surface-accent: #222f47;
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --success: #10b981;
            --danger: #f43f5e;
            --text-main: #f3f4f6;
            --text-muted: #9ca3af;
            --border: rgba(255, 255, 255, 0.05);
        }

        body {
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 15px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: var(--surface);
            border-radius: 28px;
            padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 1px solid var(--border);
            margin-top: 20px;
            box-sizing: border-box;
        }

        h2, h3, h4 {
            margin-top: 0;
            font-weight: 600;
        }

        .header-title {
            text-align: center;
            font-size: 22px;
            background: linear-gradient(to right, #a78bfa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
        }

        /* Category Cards Design */
        .section-label {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .plans-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 25px;
        }

        .plan-card {
            background: var(--surface-accent);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .plan-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 4px; height: 100%;
            background: var(--primary-light);
        }

        .plan-card.gold::before {
            background: #fbbf24;
        }

        .plan-card h4 {
            margin-bottom: 6px;
            font-size: 18px;
            color: var(--text-main);
        }

        .plan-card p {
            margin: 0;
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Form Inputs */
        .input-group {
            margin-bottom: 20px;
        }

        input, select {
            width: 100%;
            padding: 14px;
            background: rgba(11, 15, 25, 0.6);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s;
        }

        input:focus, select:focus {
            border-color: var(--primary-light);
            outline: none;
        }

        button {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: #4338ca;
        }

        .btn-sub {
            background: #2e3c54;
            margin-top: 15px;
        }

        .btn-danger { background: var(--danger); }
        .btn-success { background: var(--success); }

        /* User Profile Dashboard */
        .profile-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
            background: var(--surface-accent);
            padding: 15px;
            border-radius: 16px;
        }

        .profile-avatar {
            width: 45px;
            height: 45px;
            background: var(--primary);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
        }

        .metric-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            background: rgba(255,255,255,0.02);
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        .metric-row span {
            color: var(--text-muted);
            font-size: 14px;
        }

        .metric-row strong {
            font-size: 15px;
        }

        /* Admin Master Layout */
        .admin-box {
            background: rgba(0,0,0,0.2);
            padding: 15px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .user-manage-card {
            background: var(--surface-accent);
            padding: 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            border: 1px solid var(--border);
        }

        .inline-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 10px;
        }

        .inline-inputs input {
            padding: 8px;
            font-size: 13px;
            margin-bottom: 0;
        }
    </style>
</head>
<body>

<div class="app-container">
    <h2 class="header-title">🪙 Smart Ledger App</h2>

    <div id="home-view">
        <div class="section-label">Active Categories</div>
        <div class="plans-grid">
            <div class="plan-card">
                <h4>₹500 Plan</h4>
                <p>105 Thavanai</p>
            </div>
            <div class="plan-card gold">
                <h4>₹1000 Plan</h4>
                <p>110 Thavanai</p>
            </div>
        </div>

        <div class="input-group">
            <label for="login-username">Unga Name Enter Pannunga:</label>
            <input type="text" id="login-username" placeholder="Enter Name to view profile...">
        </div>
        <button onclick="handleNavigation()">View My Profile ➡️</button>
    </div>

    <div id="user-view" style="display: none;">
        <div class="profile-header">
            <div class="profile-avatar" id="avatar-char">U</div>
            <div>
                <h4 style="margin:0;" id="user-profile-name">User Name</h4>
                <p style="margin:0; font-size:12px; color:var(--text-muted);">Verified Seetu Account</p>
            </div>
        </div>

        <div class="section-label">Seetu Status Details</div>
        <div class="metric-list" id="user-metrics-container">
            </div>

        <button class="btn-sub" onclick="exitToHome()">Back to Home</button>
    </div>

    <div id="admin-view" style="display: none;">
        <h3 style="color: #fbbf24; text-align:center; font-size:18px;">⚙️ Master Control Panel</h3>
        
        <div class="admin-box">
            <h4 style="font-size:14px; margin-bottom:10px;">➕ Add Member Account</h4>
            <input type="text" id="adm-name" placeholder="Member Name" style="margin-bottom: 10px; padding: 10px;">
            
            <label style="font-size: 12px;">Plan Category Select Pannunga:</label>
            <select id="adm-plan" style="margin-bottom: 15px; padding: 10px;">
                <option value="500-105">₹500 Category (105 Weeks)</option>
                <option value="1000-110">₹1000 Category (110 Weeks)</option>
            </select>
            <button class="btn-success" style="padding: 10px;" onclick="adminAddUser()">Create Account</button>
        </div>

        <div class="section-label">All Active Members Management</div>
        <div id="admin-users-list">
            </div>

        <button class="btn-sub" onclick="exitToHome()">Secure Admin Logout</button>
    </div>

</div>

<script>
    // Storage Engine Setup
    let appData = JSON.parse(localStorage.getItem('seetu_v4_data')) || [];
    const sysAdminKey = "thivashthivash143@gmail.com";

    function handleNavigation() {
        let inputVal = document.getElementById('login-username').value.trim();

        if (inputVal === "") {
            alert("Name ethavathu type pannunga ba!");
            return;
        }

        // 1. Admin Gateway Route
        if (inputVal.toLowerCase() === sysAdminKey.toLowerCase()) {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'block';
            document.getElementById('user-view').style.display = 'none';
            renderAdminDashboard();
        } 
        // 2. User Route
        else {
            let userMatch = appData.find(u => u.name.toLowerCase() === inputVal.toLowerCase());
            
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('admin-view').style.display = 'none';
            document.getElementById('user-view').style.display = 'block';

            document.getElementById('user-profile-name').innerText = inputVal;
            document.getElementById('avatar-char').innerText = inputVal.charAt(0).toUpperCase();

            let metricsBox = document.getElementById('user-metrics-container');

            if (userMatch) {
                let installmentCost = userMatch.amount / userMatch.totalWeeks;
                let calculatedPaid = userMatch.paid * installmentCost;
                let calculatedBal = userMatch.amount - calculatedPaid;
                let balanceWeeks = userMatch.totalWeeks - userMatch.paid;

                metricsBox.innerHTML = `
                    <div class="metric-row"><span>Selected Category</span><strong style="color:var(--primary-light)">₹${userMatch.amount} Plan</strong></div>
                    <div class="metric-row"><span>Motha Thavanai</span><strong>${userMatch.totalWeeks} Weeks</strong></div>
                    <div class="metric-row"><span>Neenga Katriya Weeks</span><strong style="color:var(--success)">${userMatch.paid} Weeks</strong></div>
                    <div class="metric-row"><span>Meedham Irukkum Weeks</span><strong>${balanceWeeks} Weeks</strong></div>
                    <div class="metric-row" style="background:rgba(16,185,129,0.05)"><span>Katriya Total Kaasu</span><strong style="color:var(--success)">₹${calculatedPaid.toFixed(1)}</strong></div>
                    <div class="metric-row" style="background:rgba(244,63,94,0.05)"><span>Meedham Katta Vendiyathu</span><strong style="color:var(--danger)">₹${calculatedBal.toFixed(1)}</strong></div>
                `;
            } else {
                metricsBox.innerHTML = `
                    <div style="text-align:center; padding: 20px; color: var(--danger); font-size:14px;">
                        ⚠️ Intha name-la entha data-vum illa ba.<br>Admin-ta solli account create panni vaanga!
                    </div>
                `;
            }
        }
    }

    function adminAddUser() {
        let name = document.getElementById('adm-name').value.trim();
        let planConfig = document.getElementById('adm-plan').value; // format: "500-105"

        if (name === "") {
            alert("Member Name ezhuthunga!");
            return;
        }

        if (appData.some(u => u.name.toLowerCase() === name.toLowerCase())) {
            alert("Intha name ready-ah account-la irukku.");
            return;
        }

        let parts = planConfig.split('-');
        let amt = parseFloat(parts[0]);
        let weeks = parseInt(parts[1]);

        appData.push({ name: name, amount: amt, totalWeeks: weeks, paid: 0 });
        commitStorage();
        renderAdminDashboard();
        document.getElementById('adm-name').value = "";
    }

    function renderAdminDashboard() {
        let listContainer = document.getElementById('admin-users-list');
        listContainer.innerHTML = "";

        if (appData.length === 0) {
            listContainer.innerHTML = `<p style="text-align:center; font-size:13px; color:var(--text-muted);">No profiles active.</p>`;
            return;
        }

        appData.forEach((user, index) => {
            let div = document.createElement('div');
            div.className = 'user-manage-card';

            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <strong>${user.name}</strong>
                    <span style="font-size:12px; color:var(--primary-light)">₹${user.amount} Plan</span>
                </div>
                <div class="inline-inputs">
                    <div>
                        <label style="font-size:11px;">Total Weeks:</label>
                        <input type="number" id="inp-tot-${index}" value="${user.totalWeeks}">
                    </div>
                    <div>
                        <label style="font-size:11px;">Paid Weeks:</label>
                        <input type="number" id="inp-paid-${index}" value="${user.paid}">
                    </div>
                </div>
                <div style="display:flex; gap:8px; margin-top:10px;">
                    <button class="btn-success" style="padding:6px; font-size:12px;" onclick="adminSaveRow(${index})">Save Changes</button>
                    <button class="btn-danger" style="padding:6px; font-size:12px;" onclick="adminDeleteRow(${index})">Cancel Seetu</button>
                </div>
            `;
            listContainer.appendChild(div);
        });
    }

    function adminSaveRow(index) {
        let updatedTotal = parseInt(document.getElementById(`inp-tot-${index}`).value);
        let updatedPaid = parseInt(document.getElementById(`inp-paid-${index}`).value);

        if (isNaN(updatedTotal) || isNaN(updatedPaid)) {
            alert("Values numeric-ah correct-ah podunga.");
            return;
        }

        appData[index].totalWeeks = updatedTotal;
        appData[index].paid = updatedPaid;
        
        commitStorage();
        renderAdminDashboard();
        alert("Data successfully updated!");
    }

    function adminDeleteRow(index) {
        if(confirm("Intha member-oda data-vai permanent-ah delete pannidalaama?")) {
            appData.splice(index, 1);
            commitStorage();
            renderAdminDashboard();
        }
    }

    function commitStorage() {
        localStorage.setItem('seetu_v4_data', JSON.stringify(appData));
    }

    function exitToHome() {
        document.getElementById('login-username').value = "";
        document.getElementById('home-view').style.display = 'block';
        document.getElementById('admin-view').style.display = 'none';
        document.getElementById('user-view').style.display = 'none';
    }
</script>

</body>
</html>
