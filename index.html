<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Premium OS v3.0 - Stable Production</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0095f6;
            --dark-bg: #000000;
            --surface: #121212;
            --card: #1c1c1e;
            --border: #262626;
            --text: #ffffff;
            --text-muted: #a8a8a8;
            --success: #30d158;
            --danger: #ff453a;
            --gradient: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text); overflow-x: hidden; }

        /* --- SCREEN ROUTER CONTROLS --- */
        .app-screen { min-height: 100vh; width: 100%; display: none; padding-bottom: 90px; }
        .app-screen.active { display: flex; flex-direction: column; }
        .hidden { display: none !important; }

        /* --- AUTHENTICATION INTERFACE --- */
        .auth-wrapper { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .auth-card {
            width: 100%; max-width: 420px; padding: 3rem 2.5rem;
            background: var(--surface); border-radius: 28px; border: 1px solid var(--border);
            text-align: center; box-shadow: 0 25px 50px rgba(0,0,0,0.8);
        }
        .auth-card h1 { font-size: 3rem; font-weight: 900; margin-bottom: 2rem; letter-spacing: -1.5px; }
        
        .input-group { margin-bottom: 1.4rem; text-align: left; }
        .input-group label { display: block; font-size: 0.8rem; color: var(--text-muted); margin-bottom: 6px; font-weight: 700; letter-spacing: 0.5px; }
        
        input, textarea, select {
            width: 100%; padding: 16px; background: var(--card); border: 1px solid var(--border);
            border-radius: 14px; color: white; outline: none; font-size: 1rem; transition: all 0.25s ease;
        }
        input:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(0,149,246,0.15); }

        .file-upload-box {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 16px; background: var(--card); border: 2px dashed #3a3a3c;
            border-radius: 14px; cursor: pointer; font-size: 0.95rem; color: var(--text-muted); transition: 0.3s;
        }
        .file-upload-box:hover { border-color: var(--primary); color: white; background: #242426; }

        .btn {
            width: 100%; padding: 16px; background: var(--primary); border: none;
            border-radius: 14px; color: white; font-weight: 700; cursor: pointer;
            font-size: 1.05rem; transition: background 0.2s, transform 0.1s; margin-top: 10px;
        }
        .btn:hover { background: #1877f2; }
        .btn:active { transform: scale(0.98); }

        /* --- APPNATION SHELL LAYOUT --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; padding: 18px 0; z-index: 1000;
        }
        .nav-item { color: var(--text-muted); font-size: 1.7rem; cursor: pointer; transition: 0.2s; }
        .nav-item:hover { color: var(--text); transform: scale(1.1); }
        .nav-item.active-nav { color: var(--text); }

        /* --- CONTENT STREAM (INSTAGRAM STYLED) --- */
        .app-container { max-width: 550px; margin: 0 auto; width: 100%; padding: 15px; }
        .header-top { display: flex; justify-content: space-between; align-items: center; padding: 15px 0; position: sticky; top: 0; background: var(--dark-bg); z-index: 900; }
        
        .post-card { background: var(--surface); border-radius: 20px; margin-bottom: 25px; border: 1px solid var(--border); overflow: hidden; }
        .post-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; }
        .post-user-info { display: flex; align-items: center; gap: 12px; }
        .user-avatar { width: 42px; height: 42px; border-radius: 50%; object-fit: cover; border: 1px solid #2d2d2d; }
        
        .media-holder { width: 100%; background: #050505; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .media-holder img, .media-holder video { width: 100%; height: auto; max-height: 600px; display: block; object-fit: contain; }
        
        .reels-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.75); backdrop-filter: blur(8px); padding: 6px 14px; border-radius: 30px; font-size: 0.75rem; font-weight: 800; display: flex; align-items: center; gap: 8px; border: 1px solid rgba(255,255,255,0.1); }

        .post-body { padding: 16px; }
        .post-actions { display: flex; gap: 20px; font-size: 1.6rem; margin-bottom: 12px; }
        .post-actions i { cursor: pointer; transition: 0.2s; }
        .post-actions i:hover { transform: scale(1.2); }
        
        /* --- CORE MESSENGER SYSTEM --- */
        .chat-list-item { display: flex; align-items: center; justify-content: space-between; padding: 16px; background: var(--surface); border-radius: 16px; border: 1px solid var(--border); margin-bottom: 12px; cursor: pointer; transition: 0.2s; }
        .chat-list-item:hover { background: var(--card); border-color: #333; }
        
        .chat-box-area { display: flex; flex-direction: column; height: calc(100vh - 140px); background: var(--surface); border-radius: 20px; border: 1px solid var(--border); overflow: hidden; }
        .chat-messages { flex: 1; padding: 18px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #0b0b0b; }
        .msg-line { max-width: 75%; padding: 12px 18px; border-radius: 22px; font-size: 0.95rem; word-wrap: break-word; line-height: 1.4; }
        .msg-me { background: var(--primary); align-self: flex-end; border-bottom-right-radius: 4px; color: white; }
        .msg-other { background: var(--card); align-self: flex-start; border-bottom-left-radius: 4px; color: white; border: 1px solid var(--border); }
        .chat-footer { padding: 14px; display: flex; gap: 12px; background: var(--surface); border-top: 1px solid var(--border); }

        /* --- FULL SCREEN REELS VIEWER LAYER --- */
        #reels-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 3000; display: none; flex-direction: column; justify-content: center; }
        .reels-player-engine { width: 100%; height: 100%; object-fit: contain; }
        .reels-exit-btn { position: absolute; top: 25px; left: 25px; z-index: 3100; font-size: 1.8rem; color: white; cursor: pointer; background: rgba(0,0,0,0.5); width: 50px; height: 50px; display: flex; align-items: center; justify-content: center; border-radius: 50%; backdrop-filter: blur(5px); }

        /* --- ADMIN PANEL CARD STUDIO --- */
        .admin-studio { background: linear-gradient(135deg, #161618 0%, #0c0c0e 100%); border-radius: 22px; padding: 24px; border: 1px dashed var(--primary); margin-bottom: 25px; box-shadow: 0 10px 30px rgba(0,149,246,0.05); }
    </style>
</head>
<body>

    <div id="scr-auth" class="app-screen active">
        <div class="auth-wrapper">
            <div class="auth-card">
                <h1 style="background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">NexGen</h1>
                
                <div id="flow-login">
                    <div class="input-group">
                        <input type="text" id="auth-email" placeholder="Username / Admin Email">
                    </div>
                    <div class="input-group">
                        <input type="password" id="auth-pass" placeholder="Password">
                    </div>
                    <button class="btn" onclick="App.session.login()">Secure Log In</button>
                    <p style="margin-top:24px; font-size:0.85rem; color:var(--text-muted); cursor:pointer;" onclick="App.utils.toggleAuthFlow(false)">New Account? <b style="color:var(--primary)">Register Core Node</b></p>
                </div>

                <div id="flow-register" class="hidden">
                    <div class="input-group">
                        <input type="text" id="reg-username" placeholder="Create Unique Username">
                    </div>
                    <div class="input-group">
                        <textarea id="reg-bio" placeholder="Write profile bio description..."></textarea>
                    </div>
                    <div class="input-group">
                        <label class="file-upload-box" id="lbl-avatar">
                            <i class="fa-solid fa-image"></i> <span id="txt-avatar">Choose Profile Image File</span>
                            <input type="file" id="reg-file-avatar" accept="image/*" class="hidden" onchange="document.getElementById('txt-avatar').innerText='Image Ready ✅'">
                        </label>
                    </div>
                    <div class="input-group">
                        <input type="password" id="reg-password" placeholder="Create Secure Password">
                    </div>
                    <button class="btn" onclick="App.session.register()">Register Account</button>
                    <p style="margin-top:24px; font-size:0.85rem; color:var(--text-muted); cursor:pointer;" onclick="App.utils.toggleAuthFlow(true)">Have an account? <b style="color:var(--primary)">Return to Portal</b></p>
                </div>
            </div>
        </div>
    </div>

    <div id="shell-app" class="hidden">
        
        <div id="scr-feed" class="app-screen">
            <div class="app-container">
                <div class="header-top">
                    <h2 style="font-weight: 900; font-size: 2rem; letter-spacing: -1px; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">NexGen</h2>
                    <i class="fa-brands fa-facebook-messenger" style="font-size:1.6rem; cursor:pointer;" onclick="App.router.navigate('chat')"></i>
                </div>

                <div id="admin-studio-box" class="admin-studio hidden">
                    <p style="color: var(--primary); font-weight: 800; font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 15px;"><i class="fa-solid fa-crown"></i> THIVASH SYSTEM STUDIO MASTER CONSOLE</p>
                    <div class="input-group">
                        <input type="text" id="studio-caption" placeholder="Write context description / caption...">
                    </div>
                    <div class="input-group" style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                        <label class="file-upload-box" id="lbl-media">
                            <i class="fa-solid fa-cloud-arrow-up"></i> <span id="txt-media">Select File</span>
                            <input type="file" id="studio-file" accept="image/*,video/*" class="hidden" onchange="document.getElementById('txt-media').innerText='Media Loaded ✅'">
                        </label>
                        <select id="studio-type">
                            <option value="image">Standard Post Frame</option>
                            <option value="video">Vertical Video Reel</option>
                        </select>
                    </div>
                    <button class="btn" onclick="App.engine.publishPost()">Deploy Content Parameters</button>
                </div>

                <div id="timeline-stream-target"></div>
            </div>
        </div>

        <div id="scr-chat" class="app-screen">
            <div class="app-container">
                <div class="header-top">
                    <h2 style="font-weight:800; font-size:1.6rem;">Direct Messages</h2>
                    <i class="fa-solid fa-user-plus" style="font-size:1.4rem; color:var(--primary); cursor:pointer;" onclick="App.router.navigate('search')"></i>
                </div>

                <div id="chat-frame-active" class="chat-box-area hidden">
                    <div style="padding:16px; background:var(--card); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px;">
                        <i class="fa-solid fa-chevron-left" style="cursor:pointer; font-size:1.2rem;" onclick="App.utils.closeActiveChat()"></i>
                        <b id="active-chat-peer-name" style="font-size:1.1rem; color:var(--primary);">Secure Link Channel</b>
                    </div>
                    <div class="chat-messages" id="chat-stream-target"></div>
                    <div class="chat-footer">
                        <input type="text" id="chat-input-text" placeholder="Type structural chat message...">
                        <button class="btn" style="width:auto; margin:0; padding:12px 22px;" onclick="App.engine.dispatchMessage()"><i class="fa-solid fa-paper-plane"></i></button>
                    </div>
                </div>

                <div id="chat-directory-list"></div>
            </div>
        </div>

        <div id="scr-search" class="app-screen">
            <div class="app-container">
                <h2 style="font-weight:800;">Global Index Lookup</h2>
                <input type="text" id="search-query-input" placeholder="Search unique profiles accounts..." oninput="App.engine.executeLookup()" style="margin: 18px 0;">
                <div id="search-directory-target"></div>
            </div>
        </div>

        <nav class="nav-bar">
            <i class="fa-solid fa-house nav-item" id="nv-feed" onclick="App.router.navigate('feed')"></i>
            <i class="fa-solid fa-magnifying-glass nav-item" id="nv-search" onclick="App.router.navigate('search')"></i>
            <i class="fa-solid fa-message nav-item" id="nv-chat" onclick="App.router.navigate('chat')"></i>
            <i class="fa-solid fa-right-from-bracket nav-item" style="color:var(--danger);" onclick="window.location.reload()"></i>
        </nav>
    </div>

    <div id="reels-overlay">
        <div class="reels-exit-btn" onclick="App.utils.terminateReelsMode()"><i class="fa-solid fa-xmark"></i></div>
        <video id="reels-video-playback-node" class="reels-player-engine" controls autoplay loop></video>
    </div>

    <script>
        // --- HIGH STORAGE CAPACITY INDEXEDDB INSTANTIATION MACHINE ---
        const CoreDB = {
            db: null,
            init: () => {
                return new Promise((resolve, reject) => {
                    let request = indexedDB.open("NexGenStableStorageEngine", 2);
                    request.onupgradeneeded = (e) => {
                        let db = e.target.result;
                        if (!db.objectStoreNames.contains("users")) db.createObjectStore("users", { keyPath: "username" });
                        if (!db.objectStoreNames.contains("posts")) db.createObjectStore("posts", { keyPath: "id", autoIncrement: true });
                        if (!db.objectStoreNames.contains("messages")) db.createObjectStore("messages", { keyPath: "id", autoIncrement: true });
                        if (!db.objectStoreNames.contains("follows")) db.createObjectStore("follows", { keyPath: "id", autoIncrement: true });
                    };
                    request.onsuccess = (e) => { CoreDB.db = e.target.result; resolve(); };
                    request.onerror = () => reject();
                });
            },
            write: (store, data) => {
                return new Promise((resolve) => {
                    let tx = CoreDB.db.transaction(store, "readwrite");
                    let obj = tx.objectStore(store);
                    obj.put(data);
                    tx.oncomplete = () => resolve(true);
                });
            },
            readAll: (store) => {
                return new Promise((resolve) => {
                    let tx = CoreDB.db.transaction(store, "readonly");
                    let obj = tx.objectStore(store);
                    let req = obj.getAll();
                    req.onsuccess = () => resolve(req.result || []);
                });
            }
        };

        // --- GLOBAL CORE RUNTIME CONTROLLER ARRAYS ---
        const App = {
            account: null,
            activeChatNode: null,
            adminMeta: { user: "thivashthivash143@gmail.com", key: "thivash2009" },

            init: async () => {
                try {
                    await CoreDB.init();
                    // Multi-vector matching protocol configurations (Injecting Admin with overlapping key fields)
                    let baseAdminObj = { 
                        username: "thivash", 
                        email: App.adminMeta.user, 
                        password: App.adminMeta.key, 
                        bio: "NexGen Platform Administrator Core Owner", 
                        avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Thivash" 
                    };
                    await CoreDB.write("users", baseAdminObj);
                    console.log("Database initialized cleanly. Core vectors mapped.");
                } catch(err) {
                    alert("Database engine synchronization failed. Refresh terminal window.");
                }
            },

            router: {
                navigate: (screen) => {
                    document.querySelectorAll('.app-screen').forEach(s => s.classList.remove('active'));
                    document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active-nav'));
                    
                    document.getElementById('scr-' + screen).classList.add('active');
                    let navItem = document.getElementById('nv-' + screen);
                    if(navItem) navItem.classList.add('active-nav');

                    if(screen === 'feed') App.engine.renderFeedTimeline();
                    if(screen === 'chat') App.engine.renderChatDirectory();
                }
            },

            session: {
                register: async () => {
                    const u = document.getElementById('reg-username').value.trim().toLowerCase();
                    const b = document.getElementById('reg-bio').value;
                    const p = document.getElementById('reg-password').value;
                    const f = document.getElementById('reg-file-avatar').files[0];

                    if(!u || !p || !f) return alert("Validation tracking parameters failed. Complete profile frames.");

                    let avData = await App.utils.blobConverter(f);
                    let newUser = { username: u, email: u + "@nexgen.io", password: p, bio: b, avatar: avData };
                    
                    await CoreDB.write("users", newUser);
                    alert("Registration committed structural data blocks cleanly. Proceed to Auth Portal.");
                    App.utils.toggleAuthFlow(true);
                },

                login: async () => {
                    const userVal = document.getElementById('auth-email').value.trim().toLowerCase();
                    const passVal = document.getElementById('auth-pass').value;

                    if(!userVal || !passVal) return alert("Missing entry credentials payload.");

                    let users = await CoreDB.readAll("users");
                    
                    // FIXED DEEP AUTH LAYER PROTOCOL MATCH ENGINE
                    let match = users.find(u => 
                        (u.username === userVal || u.email.toLowerCase() === userVal) && 
                        u.password === passVal
                    );

                    if(!match) return alert("Authentication failure. Configuration verification keys do not compute.");

                    App.account = match;
                    document.getElementById('scr-auth').classList.remove('active');
                    document.getElementById('shell-app').classList.remove('hidden');

                    // If user parameters overlap or equate tracking config fields -> Unlock Studio
                    if(App.account.email === App.adminMeta.user || App.account.username === "thivash") {
                        document.getElementById('admin-studio-box').classList.remove('hidden');
                    }
                    App.router.navigate('feed');
                }
            },

            engine: {
                publishPost: async () => {
                    const cap = document.getElementById('studio-caption').value;
                    const type = document.getElementById('studio-type').value;
                    const f = document.getElementById('studio-file').files[0];

                    if(!f) return alert("Select media asset payload packet framework to route.");

                    let mediaBlob = await App.utils.blobConverter(f);
                    let contentPayload = {
                        author: "Thivash Admin",
                        avatar: App.account.avatar,
                        caption: cap,
                        media: mediaBlob,
                        type: type,
                        timestamp: Date.now()
                    };

                    await CoreDB.write("posts", contentPayload);
                    document.getElementById('studio-caption').value = '';
                    document.getElementById('txt-media').innerText = "Select File";
                    App.engine.renderFeedTimeline();
                },

                renderFeedTimeline: async () => {
                    const target = document.getElementById('timeline-stream-target');
                    target.innerHTML = '';
                    let posts = await CoreDB.readAll("posts");
                    posts.sort((a,b) => b.timestamp - a.timestamp);

                    if(posts.length === 0) {
                        target.innerHTML = `<p style="text-align:center; padding:50px 20px; color:var(--text-muted); font-size:0.9rem;">Network system feed pipeline is empty. Upload media objects above.</p>`;
                        return;
                    }

                    posts.forEach(p => {
                        let dynamicAttachment = p.type === 'video'
                            ? `<div class="media-holder" onclick="App.utils.launchReelsMode('${p.media}')">
                                 <video src="${p.media}" autoplay muted playsinline loop></video>
                                 <div class="reels-badge"><i class="fa-solid fa-clapperboard"></i> REELS VIEW</div>
                               </div>`
                            : `<div class="media-holder"><img src="${p.media}"></div>`;

                        target.innerHTML += `
                            <div class="post-card">
                                <div class="post-header">
                                    <div class="post-user-info">
                                        <img src="${p.avatar}" class="user-avatar">
                                        <b style="font-size:0.95rem;">${p.author}</b>
                                    </div>
                                    <i class="fa-solid fa-circle-check" style="color:var(--primary)"></i>
                                </div>
                                ${dynamicAttachment}
                                <div class="post-body">
                                    <div class="post-actions">
                                        <i class="fa-regular fa-heart" onclick="App.utils.likeReaction(this)"></i>
                                        <i class="fa-regular fa-comment"></i>
                                        <i class="fa-regular fa-paper-plane"></i>
                                    </div>
                                    <div style="font-size:0.9rem; font-weight:700; margin-bottom:6px; color:var(--text-muted)">Verified Core Impression</div>
                                    <div style="font-size:0.95rem; line-height:1.4;"><b style="margin-right:8px;">${p.author}</b>${p.caption}</div>
                                </div>
                            </div>
                        `;
                    });
                },

                executeLookup: async () => {
                    const query = document.getElementById('search-query-input').value.toLowerCase().trim();
                    const target = document.getElementById('search-directory-target');
                    target.innerHTML = '';
                    if(!query) return;

                    let users = await CoreDB.readAll("users");
                    let filtered = users.filter(u => u.username.includes(query) && u.username !== App.account.username);

                    filtered.forEach(u => {
                        target.innerHTML += `
                            <div class="chat-list-item">
                                <div style="display:flex; align-items:center; gap:12px;">
                                    <img src="${u.avatar}" class="user-avatar">
                                    <div>
                                        <div style="font-weight:700;">${u.username}</div>
                                        <div style="font-size:0.8rem; color:var(--text-muted);">${u.bio || 'Active Client Node'}</div>
                                    </div>
                                </div>
                                <button class="btn" style="width:auto; margin:0; padding:10px 16px; font-size:0.8rem;" onclick="App.engine.initiateTunnel('${u.username}')"><i class="fa-solid fa-user-plus"></i> Connect</button>
                            </div>
                        `;
                    });
                },

                initiateTunnel: async (peerUsername) => {
                    let followLink = { from: App.account.username, to: peerUsername, status: "Connected" };
                    await CoreDB.write("follows", followLink);
                    alert("Tunnel tracking connection link generated cleanly.");
                    App.router.navigate('chat');
                },

                renderChatDirectory: async () => {
                    const target = document.getElementById('chat-directory-list');
                    target.innerHTML = '';
                    let links = await CoreDB.readAll("follows");
                    let users = await CoreDB.readAll("users");

                    let peers = links.filter(l => l.from === App.account.username || l.to === App.account.username);
                    let renderedNames = [];

                    if(peers.length === 0) {
                        target.innerHTML = `<p style="text-align:center; padding:40px; color:var(--text-muted); font-size:0.9rem;">No active secured routing paths. Query node index mapping matrix.</p>`;
                    }

                    peers.forEach(p => {
                        let peerName = p.from === App.account.username ? p.to : p.from;
                        if(renderedNames.includes(peerName)) return;
                        renderedNames.push(peerName);

                        let peerProfile = users.find(u => u.username === peerName);
                        if(!peerProfile) return;

                        target.innerHTML += `
                            <div class="chat-list-item" onclick="App.utils.openActiveChatWindow('${peerProfile.username}')">
                                <div style="display:flex; align-items:center; gap:12px;">
                                    <img src="${peerProfile.avatar}" class="user-avatar">
                                    <div>
                                        <div style="font-weight:700;">${peerProfile.username}</div>
                                        <div style="font-size:0.8rem; color:var(--success); font-weight:600;"><i class="fa-solid fa-shield-halved"></i> Active Direct Interface Linked</div>
                                    </div>
                                </div>
                                <i class="fa-solid fa-angles-right" style="color:var(--text-muted)"></i>
                            </div>
                        `;
                    });
                },

                dispatchMessage: async () => {
                    const txt = document.getElementById('chat-input-text').value;
                    if(!txt) return;

                    let msgObj = { from: App.account.username, to: App.activeChatNode, text: txt, stamp: Date.now() };
                    await CoreDB.write("messages", msgObj);
                    document.getElementById('chat-input-text').value = '';
                    App.utils.loadChatStream();
                }
            },

            utils: {
                toggleAuthFlow: (showLogin) => {
                    document.getElementById('flow-login').classList.toggle('hidden', !showLogin);
                    document.getElementById('flow-register').classList.toggle('hidden', showLogin);
                },
                blobConverter: (file) => new Promise((res) => {
                    let r = new FileReader();
                    r.readAsDataURL(file);
                    r.onloadend = () => res(r.result);
                }),
                likeReaction: (el) => {
                    if(el.classList.contains('fa-regular')) {
                        el.className = 'fa-solid fa-heart';
                        el.style.color = 'var(--danger)';
                    } else {
                        el.className = 'fa-regular fa-heart';
                        el.style.color = 'white';
                    }
                },
                launchReelsMode: (src) => {
                    const overlay = document.getElementById('reels-overlay');
                    const player = document.getElementById('reels-video-playback-node');
                    player.src = src;
                    overlay.style.display = 'flex';
                },
                terminateReelsMode: () => {
                    const overlay = document.getElementById('reels-overlay');
                    const player = document.getElementById('reels-video-playback-node');
                    player.pause();
                    overlay.style.display = 'none';
                },
                openActiveChatWindow: (peer) => {
                    App.activeChatNode = peer;
                    document.getElementById('chat-directory-list').classList.add('hidden');
                    document.getElementById('chat-frame-active').classList.remove('hidden');
                    document.getElementById('active-chat-peer-name').innerText = "@" + peer;
                    App.utils.loadChatStream();
                },
                closeActiveChat: () => {
                    document.getElementById('chat-directory-list').classList.remove('hidden');
                    document.getElementById('chat-frame-active').classList.add('hidden');
                },
                loadChatStream: async () => {
                    const target = document.getElementById('chat-stream-target');
                    target.innerHTML = '';
                    let msgs = await CoreDB.readAll("messages");

                    let filter = msgs.filter(m => (m.from === App.account.username && m.to === App.activeChatNode) || (m.from === App.activeChatNode && m.to === App.account.username));
                    filter.forEach(m => {
                        let side = m.from === App.account.username ? 'msg-me' : 'msg-other';
                        target.innerHTML += `<div class="msg-line ${side}">${m.text}</div>`;
                    });
                    target.scrollTop = target.scrollHeight;
                }
            }
        };

        window.onload = () => { App.init(); };
    </script>
</body>
</html>
