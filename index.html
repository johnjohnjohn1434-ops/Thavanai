<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexGen Premium | File Upload Edition</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #0095f6;
            --dark-bg: #000000;
            --surface: #121212;
            --border: #262626;
            --text: #ffffff;
            --text-muted: #a8a8a8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background-color: var(--dark-bg); color: var(--text); overflow-x: hidden; }

        /* --- UTILS --- */
        .hidden { display: none !important; }
        .app-screen { min-height: 100vh; width: 100%; display: none; }
        .active { display: flex; flex-direction: column; }

        /* --- AUTH & REGISTER --- */
        .auth-card {
            width: 90%; max-width: 400px; margin: auto; padding: 2.5rem;
            background: var(--surface); border-radius: 20px; border: 1px solid var(--border);
            text-align: center;
        }
        h1 { font-size: 2.5rem; margin-bottom: 1.5rem; font-weight: 800; }
        .input-group { margin-bottom: 1rem; text-align: left; }
        input, textarea {
            width: 100%; padding: 12px; background: #1e1e1e; border: 1px solid var(--border);
            border-radius: 10px; color: white; outline: none;
        }

        .file-label {
            display: block; padding: 10px; background: #333; border-radius: 8px;
            cursor: pointer; margin-top: 5px; font-size: 0.8rem;
        }

        .btn {
            width: 100%; padding: 12px; background: var(--primary); border: none;
            border-radius: 10px; color: white; font-weight: 700; cursor: pointer;
            margin-top: 10px;
        }

        /* --- NAV --- */
        .nav-bar {
            position: fixed; bottom: 0; width: 100%; background: rgba(0,0,0,0.9);
            border-top: 1px solid var(--border); display: flex;
            justify-content: space-around; padding: 15px 0; z-index: 1000;
        }
        .nav-item { color: var(--text-muted); font-size: 1.5rem; cursor: pointer; }
        .active-nav { color: white; }

        /* --- FEED & REELS --- */
        .container { max-width: 500px; margin: 0 auto; padding: 15px; padding-bottom: 80px; }
        .post-card { background: var(--surface); border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
        .post-header { padding: 10px; display: flex; align-items: center; gap: 10px; }
        .post-header img { width: 35px; height: 35px; border-radius: 50%; object-fit: cover; }
        
        .media-box { width: 100%; background: #000; position: relative; }
        .media-box img, .media-box video { width: 100%; display: block; }

        .reels-badge { position: absolute; top: 15px; right: 15px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 20px; font-size: 0.7rem; }

        /* --- REELS VIEWER --- */
        #reels-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 3000; display: none;
        }
        .reels-video-full { width: 100%; height: 100%; object-fit: contain; }
        .close-reels { position: absolute; top: 20px; left: 20px; z-index: 3001; font-size: 1.5rem; }

        /* --- UPLOAD SECTION --- */
        .admin-panel {
            background: #1a1a1a; padding: 20px; border-radius: 15px; margin-bottom: 20px;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

    <!-- 1. LOGIN / REGISTER SCREEN -->
    <div id="auth-screen" class="app-screen active">
        <div class="auth-card">
            <h1>NexGen</h1>
            <div id="login-form">
                <div class="input-group"><input type="text" id="log-user" placeholder="Email / Username"></div>
                <div class="input-group"><input type="password" id="log-pass" placeholder="Password"></div>
                <button class="btn" onclick="App.handleLogin()">Log In</button>
                <p style="margin-top:15px; font-size:0.8rem; color:gray;" onclick="App.toggleAuth(false)">New here? Create Account</p>
            </div>
            <div id="reg-form" class="hidden">
                <div class="input-group"><input type="text" id="reg-name" placeholder="Full Name"></div>
                <div class="input-group">
                    <label class="file-label">Choose Profile Picture
                        <input type="file" id="reg-avatar-file" accept="image/*" class="hidden">
                    </label>
                </div>
                <div class="input-group"><input type="password" id="reg-pass" placeholder="Password"></div>
                <button class="btn" onclick="App.handleRegister()">Sign Up</button>
                <p style="margin-top:15px; font-size:0.8rem; color:gray;" onclick="App.toggleAuth(true)">Back to Login</p>
            </div>
        </div>
    </div>

    <!-- 2. MAIN APP -->
    <div id="main-app" class="hidden">
        <div id="feed-screen" class="app-screen active">
            <div class="container">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
                    <h2 style="font-weight:800; font-size:1.8rem;">NexGen</h2>
                    <i class="fa-regular fa-paper-plane" style="font-size:1.4rem;"></i>
                </div>

                <!-- ADMIN UPLOAD AREA -->
                <div id="admin-area" class="admin-panel hidden">
                    <p style="color:var(--primary); font-weight:700; font-size:0.8rem; margin-bottom:10px;">ADMIN CONSOLE</p>
                    <input type="text" id="post-cap" placeholder="Write a caption..." style="margin-bottom:10px;">
                    <label class="file-label" id="file-status">Select Image or Video File
                        <input type="file" id="post-file" accept="image/*,video/*" class="hidden" onchange="document.getElementById('file-status').innerText='File Selected ✅'">
                    </label>
                    <button class="btn" onclick="App.uploadPost()">Publish to Network</button>
                </div>

                <div id="feed-target"></div>
            </div>
        </div>

        <!-- NAVIGATION -->
        <nav class="nav-bar">
            <i class="fa-solid fa-house nav-item active-nav"></i>
            <i class="fa-solid fa-magnifying-glass nav-item"></i>
            <i class="fa-solid fa-clapperboard nav-item"></i>
            <i class="fa-solid fa-message nav-item"></i>
            <i class="fa-solid fa-circle-user nav-item"></i>
        </nav>
    </div>

    <!-- REELS VIEWER -->
    <div id="reels-modal">
        <div class="close-reels" onclick="App.closeReels()"><i class="fa-solid fa-arrow-left"></i></div>
        <video id="reels-player" class="reels-video-full" controls autoplay loop></video>
    </div>

    <script>
        const App = {
            user: null,
            adminEmail: "thivashthivash143@gmail.com",
            adminPass: "thivash2009",

            toggleAuth: (showLogin) => {
                document.getElementById('login-form').classList.toggle('hidden', !showLogin);
                document.getElementById('reg-form').classList.toggle('hidden', showLogin);
            },

            // Convert File to Base64 to store in localStorage (Real DB thirupathiku ithu thaan orey vazhi single file-la)
            fileToBase64: (file) => new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = error => reject(error);
            }),

            handleRegister: async () => {
                const name = document.getElementById('reg-name').value;
                const pass = document.getElementById('reg-pass').value;
                const avatarFile = document.getElementById('reg-avatar-file').files[0];

                if(!name || !pass || !avatarFile) return alert("Fill all fields and pick a photo!");

                const avatarBase64 = await App.fileToBase64(avatarFile);
                let users = JSON.parse(localStorage.getItem('nx_users')) || [];
                users.push({ name, pass, avatar: avatarBase64 });
                localStorage.setItem('nx_users', JSON.stringify(users));

                alert("Account Created! Please Login.");
                App.toggleAuth(true);
            },

            handleLogin: () => {
                const userVal = document.getElementById('log-user').value;
                const passVal = document.getElementById('log-pass').value;

                if(userVal === App.adminEmail && passVal === App.adminPass) {
                    App.user = { name: "Admin Thivash", isAdmin: true, avatar: "https://api.dicebear.com/7.x/bottts/svg?seed=Admin" };
                } else {
                    let users = JSON.parse(localStorage.getItem('nx_users')) || [];
                    let found = users.find(u => u.name === userVal && u.pass === passVal);
                    if(!found) return alert("Wrong credentials!");
                    App.user = { ...found, isAdmin: false };
                }

                document.getElementById('auth-screen').classList.remove('active');
                document.getElementById('main-app').classList.remove('hidden');
                
                if(App.user.isAdmin) document.getElementById('admin-area').classList.remove('hidden');
                App.renderFeed();
            },

            uploadPost: async () => {
                const cap = document.getElementById('post-cap').value;
                const file = document.getElementById('post-file').files[0];

                if(!file) return alert("Select a file first!");

                const fileData = await App.fileToBase64(file);
                const isVideo = file.type.startsWith('video');

                let posts = JSON.parse(localStorage.getItem('nx_posts')) || [];
                posts.unshift({
                    id: Date.now(),
                    author: App.user.name,
                    avatar: App.user.avatar,
                    caption: cap,
                    media: fileData,
                    type: isVideo ? 'video' : 'image'
                });

                localStorage.setItem('nx_posts', JSON.stringify(posts));
                document.getElementById('post-cap').value = "";
                document.getElementById('file-status').innerText = "Select Image or Video File";
                App.renderFeed();
            },

            renderFeed: () => {
                const target = document.getElementById('feed-target');
                const posts = JSON.parse(localStorage.getItem('nx_posts')) || [];
                target.innerHTML = "";

                posts.forEach(p => {
                    const mediaTag = p.type === 'video' 
                        ? `<div class="media-box" onclick="App.openReels('${p.media}')">
                             <video src="${p.media}"></video>
                             <div class="reels-badge"><i class="fa-solid fa-play"></i> REELS</div>
                           </div>`
                        : `<div class="media-box"><img src="${p.media}"></div>`;

                    target.innerHTML += `
                        <div class="post-card">
                            <div class="post-header">
                                <img src="${p.avatar}">
                                <span style="font-weight:700;">${p.author}</span>
                            </div>
                            ${mediaTag}
                            <div style="padding:12px;">
                                <div style="display:flex; gap:15px; font-size:1.4rem; margin-bottom:8px;">
                                    <i class="fa-regular fa-heart" onclick="this.className='fa-solid fa-heart'; this.style.color='red'"></i>
                                    <i class="fa-regular fa-comment"></i>
                                    <i class="fa-regular fa-paper-plane"></i>
                                </div>
                                <div style="font-size:0.9rem;"><b>${p.author}</b> ${p.caption}</div>
                            </div>
                        </div>
                    `;
                });
            },

            openReels: (src) => {
                const modal = document.getElementById('reels-modal');
                const player = document.getElementById('reels-player');
                player.src = src;
                modal.style.display = 'block';
            },

            closeReels: () => {
                const modal = document.getElementById('reels-modal');
                const player = document.getElementById('reels-player');
                player.pause();
                modal.style.display = 'none';
            }
        };
    </script>
</body>
</html>
